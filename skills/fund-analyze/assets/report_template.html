<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root{--bg:#f6f7f9;--card:#fff;--ink:#1c2530;--sub:#6b7684;--line:#e6e9ee;
        --buy:#1f9d55;--hold:#c9820a;--avoid:#d1422f;--accent:#2b6cb0}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .wrap{max-width:960px;margin:0 auto;padding:24px 16px 60px}
  h1{font-size:22px;margin:0 0 2px}.sub{color:var(--sub);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
  .verdict{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .badge{font-size:26px;font-weight:800;padding:10px 20px;border-radius:12px;color:#fff}
  .verdict .score{font-size:40px;font-weight:800}.verdict .score small{font-size:14px;color:var(--sub);font-weight:500}
  .dims{flex:1;min-width:240px}
  .dim{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px}
  .dim .name{width:64px;color:var(--sub)}.dim .track{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden}
  .dim .fill{height:100%;border-radius:6px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .metric .v{font-size:20px;font-weight:700}.metric .l{font-size:12px;color:var(--sub)}
  .chart{width:100%;height:380px}.chart.sm{height:280px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}
  h2{font-size:15px;margin:2px 0 10px;color:var(--ink)}
  .prose p{margin:8px 0}.prose ul{margin:8px 0;padding-left:20px}.prose li{margin:4px 0}
  .risk{border-left:3px solid var(--avoid);background:#fdf3f1;padding:10px 14px;border-radius:8px;font-size:14px}
  .foot{color:var(--sub);font-size:12px;margin-top:24px;text-align:center}
  .pos{color:var(--buy)}.neg{color:var(--avoid)}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title"></h1><div class="sub" id="subtitle"></div>

  <div class="card verdict">
    <div class="badge" id="badge"></div>
    <div class="score"><span id="score"></span><small>/100</small></div>
    <div class="dims" id="dims"></div>
  </div>

  <div class="card"><h2 id="priceTitle">价格走势</h2><div id="priceChart" class="chart"></div></div>

  <div class="cards" id="metricCards" style="margin-bottom:16px"></div>

  <div class="grid2">
    <div class="card"><h2>回撤曲线</h2><div id="ddChart" class="chart sm"></div></div>
    <div class="card" id="holdingsCard"><h2>持仓结构（前十大）</h2><div id="holdChart" class="chart sm"></div></div>
  </div>

  <div class="card prose"><h2>深度解读</h2><div id="commentary"></div></div>
  <div class="card"><h2>风险提示 / 离场信号</h2><div class="risk" id="risks"></div></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const R = __REPORT_JSON__;
const $=id=>document.getElementById(id);
const fmtPct=x=>x==null?'—':(x*100).toFixed(2)+'%';
const COLOR={buy:'#1f9d55',hold:'#c9820a',avoid:'#d1422f'};

$('title').textContent=R.title;
$('subtitle').textContent=R.subtitle;
$('badge').textContent=R.verdict.label;
$('badge').style.background=COLOR[R.verdict.klass]||'#2b6cb0';
$('score').textContent=R.verdict.score;
$('dims').innerHTML=R.dimensions.map(d=>{
  const c=d.score>=70?COLOR.buy:d.score>=45?COLOR.hold:COLOR.avoid;
  return `<div class="dim"><span class="name">${d.name}</span>
    <span class="track"><span class="fill" style="width:${d.score}%;background:${c}"></span></span>
    <b>${d.score}</b></div>`;}).join('');

$('metricCards').innerHTML=R.metrics.map(m=>{
  const cls=m.tone==='pos'?'pos':m.tone==='neg'?'neg':'';
  return `<div class="metric"><div class="v ${cls}">${m.value}</div><div class="l">${m.label}</div></div>`;}).join('');

// 价格图：基金=净值线+均线；黄金=K线+均线
const pc=echarts.init($('priceChart'));
const dates=R.price.dates;
const series=[];
if(R.price.kline){
  series.push({type:'candlestick',name:'K线',data:R.price.kline,
    itemStyle:{color:'#d1422f',color0:'#1f9d55',borderColor:'#d1422f',borderColor0:'#1f9d55'}});
}else{
  series.push({type:'line',name:'净值',data:R.price.nav,showSymbol:false,lineStyle:{width:1.5,color:'#2b6cb0'}});
}
if(R.price.ma20)series.push({type:'line',name:'MA20',data:R.price.ma20,showSymbol:false,lineStyle:{width:1,color:'#c9820a'}});
if(R.price.ma60)series.push({type:'line',name:'MA60',data:R.price.ma60,showSymbol:false,lineStyle:{width:1,color:'#7048e8'}});
pc.setOption({tooltip:{trigger:'axis'},legend:{top:0,textStyle:{fontSize:11}},grid:{left:48,right:16,top:28,bottom:60},
  xAxis:{type:'category',data:dates,boundaryGap:true},yAxis:{scale:true},
  dataZoom:[{type:'inside',start:60},{type:'slider',start:60,height:18,bottom:16}],series});

// 回撤
const dd=echarts.init($('ddChart'));
dd.setOption({tooltip:{trigger:'axis',valueFormatter:v=>(v*100).toFixed(1)+'%'},grid:{left:48,right:16,top:16,bottom:28},
  xAxis:{type:'category',data:dates},yAxis:{type:'value',axisLabel:{formatter:v=>(v*100).toFixed(0)+'%'}},
  series:[{type:'line',data:R.drawdown,areaStyle:{color:'rgba(209,66,47,0.15)'},lineStyle:{color:'#d1422f',width:1},showSymbol:false}]});

// 持仓饼图
if(R.holdings&&R.holdings.length){
  const pie=echarts.init($('holdChart'));
  pie.setOption({tooltip:{trigger:'item',valueFormatter:v=>v+'%'},
    series:[{type:'pie',radius:['40%','70%'],data:R.holdings.map(h=>({name:h.name,value:h.pct})),
      label:{fontSize:11}}]});
}else{$('holdingsCard').style.display='none';}

$('commentary').innerHTML=R.commentary_html;
$('risks').innerHTML=R.risks_html;
$('foot').innerHTML=R.footer;
window.addEventListener('resize',()=>{pc.resize();dd.resize();});
</script>
</body>
</html>
