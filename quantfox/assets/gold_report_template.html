<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
__ECHARTS_SCRIPT__
<style>
  :root{--bg:#f6f7f9;--card:#fff;--ink:#1c2530;--sub:#6b7684;--line:#e6e9ee;
        --pos:#1f9d55;--neg:#d1422f;--accent:#2b6cb0}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
       font-size:13px;line-height:1.6}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
  h1{font-size:20px;margin:0 0 12px}
  h2{font-size:15px;margin:0 0 8px}
  .bar{background:var(--card);border:1px solid var(--line);border-radius:10px;
       padding:9px 14px;margin-bottom:8px;font-size:12.5px}
  .disclaimer{color:var(--sub);font-size:11.5px;line-height:1.7;margin:10px 0 18px;
              border-left:3px solid var(--neg);padding:8px 12px;background:#fdf3f1;border-radius:6px}
  section.board{background:var(--card);border:1px solid var(--line);border-radius:12px;
                padding:16px 18px;margin-bottom:16px}
  .banner{font-size:12px;color:var(--sub);margin-bottom:10px}
  .banner.warn{color:var(--neg);font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:6px 7px;border-bottom:1px solid #eef1f4;text-align:right;white-space:nowrap}
  th{background:#fafbfc;color:var(--sub);font-weight:600;text-align:right}
  td.l,th.l{text-align:left}
  td.hi{background:#fdf3f1;color:var(--neg);font-weight:600}
  .flag{color:var(--neg);font-weight:600}
  .badge{display:inline-block;background:#fff3cd;color:#8a6300;border-radius:6px;
         padding:1px 6px;font-size:11px}
  .pos{color:var(--pos)}.neg{color:var(--neg)}
  .muted{color:var(--sub)}
  .chartgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-top:10px}
  .chart{width:100%;height:220px}
  .chart.sm{height:220px}
  .minigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:8px}
  .chart.mini{height:60px}
  section.review, section.holdings{background:var(--card);border:1px solid var(--line);
                border-radius:12px;padding:16px 18px;margin-bottom:16px}
  .watermark{color:var(--sub);font-size:12px;text-align:center;margin-top:20px;
             border-top:1px dashed var(--line);padding-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>__TITLE__</h1>
  __HEADER__
  __BOARDS__
  __HOLDINGS__
  __REVIEW__
  <div class="watermark">历史统计推演，非预测承诺 · 幸存者偏差与过去≠未来见页首免责声明</div>
</div>

<script>
const G = __GOLD_JSON__;
const $ = id => document.getElementById(id);
function fmtPct(x){ return x==null ? '—' : (x*100>=0?'+':'') + (x*100).toFixed(1) + '%'; }

Object.keys(G.charts || {}).forEach(function(board){
  const c = G.charts[board] || {};
  (c.fan || []).forEach(function(entry, i){
    const el = $('fan-' + board + '-' + i);
    if(!el || typeof echarts === 'undefined') return;
    const chart = echarts.init(el);
    const dates = entry.dates || [];
    const H = dates.length;
    const sim = entry.sim || {};
    const days = sim.days || [];
    const nav = entry.nav || [];
    const lastNav = nav.length ? nav[nav.length - 1] : 1;
    const fLabels = days.map(function(d){ return 'D+' + d; });
    const xData = dates.concat(fLabels);
    const histSeries = nav.concat(days.map(function(){ return null; }));
    const toAbs = function(arr){ return (arr || []).map(function(x){ return lastNav * (1 + x); }); };
    const pad = function(arr){ return new Array(H).fill(null).concat(arr); };
    const p10 = pad(toAbs(sim.p10)), p25 = pad(toAbs(sim.p25)), p50 = pad(toAbs(sim.p50)),
          p75 = pad(toAbs(sim.p75)), p90 = pad(toAbs(sim.p90));
    const diff = function(lo, hi){
      return lo.map(function(v, idx){ return (v == null || hi[idx] == null) ? null : hi[idx] - v; });
    };
    const wide = diff(p10, p90), narrow = diff(p25, p75);
    chart.setOption({
      tooltip: { trigger: 'axis', formatter: function(params){
        const p = params[0];
        const idx = p.dataIndex;
        if(idx < H){ return xData[idx] + '<br/>净值 ' + (nav[idx] == null ? '—' : nav[idx]); }
        const d = idx - H;
        const day = days[d];
        return '第' + day + '天：中位' + fmtPct(sim.p50[d]) + '，80%区间[' + fmtPct(sim.p10[d]) + ',' + fmtPct(sim.p90[d]) + ']';
      }},
      legend: { top: 0, textStyle: { fontSize: 10 } },
      grid: { left: 44, right: 12, top: 26, bottom: 18 },
      xAxis: { type: 'category', data: xData, boundaryGap: false, axisLabel: { show: false } },
      yAxis: { type: 'value', scale: true },
      series: [
        { type: 'line', name: '历史净值', data: histSeries, showSymbol: false, lineStyle: { width: 1.5, color: '#2b6cb0' } },
        { type: 'line', name: 'p10', data: p10, showSymbol: false, lineStyle: { opacity: 0 }, stack: 'wide', symbol: 'none' },
        { type: 'line', name: '80%区间', data: wide, showSymbol: false, lineStyle: { opacity: 0 }, areaStyle: { color: 'rgba(43,108,176,0.12)' }, stack: 'wide', symbol: 'none' },
        { type: 'line', name: 'p25', data: p25, showSymbol: false, lineStyle: { opacity: 0 }, stack: 'narrow', symbol: 'none' },
        { type: 'line', name: '50%区间', data: narrow, showSymbol: false, lineStyle: { opacity: 0 }, areaStyle: { color: 'rgba(43,108,176,0.25)' }, stack: 'narrow', symbol: 'none' },
        { type: 'line', name: '中位p50', data: p50, showSymbol: false, lineStyle: { width: 1.5, color: '#c9820a', type: 'dashed' } }
      ]
    });
  });
  (c.mini || []).forEach(function(entry, i){
    const el = $('mini-' + board + '-' + i);
    if(!el || typeof echarts === 'undefined') return;
    const chart = echarts.init(el);
    const p50 = entry.p50 || [];
    chart.setOption({
      grid: { left: 2, right: 2, top: 4, bottom: 2 },
      xAxis: { type: 'category', show: false, data: p50.map(function(_, idx){ return idx; }) },
      yAxis: { type: 'value', show: false, scale: true },
      tooltip: { trigger: 'axis', formatter: function(params){
        const idx = params[0].dataIndex;
        return (entry.name || entry.code) + ' 第' + (idx + 1) + '天 中位' + fmtPct(p50[idx]);
      }},
      series: [{ type: 'line', data: p50, showSymbol: false, lineStyle: { width: 1, color: '#1f9d55' } }]
    });
  });
});
</script>
</body>
</html>
